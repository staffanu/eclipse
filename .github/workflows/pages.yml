name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/eclipse-visualization-tool-1xGPt
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # Repo root is the site root: index.html lives at the top.
          path: .

      - id: deployment
        name: Deploy
        uses: actions/deploy-pages@v4
